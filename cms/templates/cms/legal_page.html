{% extends "cms/base.html" %}
{% load wagtailcore_tags %}

{% block title %}{{ page.title }}{% endblock %}

{% block extra_css %}
<style>
  .legal-hero {
    padding: 72px 0 40px;
    border-bottom: 1px solid #f3f4f6;
  }
  .legal-hero h1 {
    font-size: 38px;
    font-weight: 800;
    letter-spacing: -0.6px;
    color: #111827;
    margin-bottom: 10px;
    line-height: 1.2;
  }
  .legal-hero .last-updated {
    font-size: 13px;
    color: #9ca3af;
    font-weight: 500;
  }
  .legal-body {
    padding: 52px 0 96px;
  }
  .legal-narrow {
    max-width: 760px;
    margin: 0 auto;
    padding: 0 48px;
  }
  .richtext {
    color: #374151;
    font-size: 16px;
    line-height: 1.8;
  }
  .richtext h1,
  .richtext h2,
  .richtext h3,
  .richtext h4 {
    color: #111827;
    font-weight: 700;
    letter-spacing: -0.3px;
    line-height: 1.3;
    margin-top: 2.5rem;
    margin-bottom: 0.65rem;
  }
  .richtext h1 { font-size: 28px; }
  .richtext h2 { font-size: 22px; }
  .richtext h3 { font-size: 18px; }
  .richtext h4 { font-size: 16px; }
  .richtext p {
    margin-bottom: 1.15rem;
  }
  .richtext ul,
  .richtext ol {
    padding-left: 1.5rem;
    margin-bottom: 1.15rem;
  }
  .richtext li {
    margin-bottom: 0.35rem;
  }
  .richtext a {
    color: #6366f1;
    text-decoration: underline;
    text-underline-offset: 3px;
  }
  .richtext a:hover {
    color: #4f46e5;
  }
  .richtext blockquote {
    border-left: 3px solid #6366f1;
    padding-left: 1.25rem;
    margin: 2rem 0;
    color: #6b7280;
    font-style: italic;
  }
  .richtext strong {
    font-weight: 700;
    color: #111827;
  }
  .richtext hr {
    border: none;
    border-top: 1px solid #f3f4f6;
    margin: 2.5rem 0;
  }
  .richtext table {
    width: 100%;
    border-collapse: collapse;
    margin-bottom: 1.5rem;
    font-size: 14px;
  }
  .richtext th,
  .richtext td {
    padding: 10px 14px;
    border: 1px solid #e5e7eb;
    text-align: left;
  }
  .richtext th {
    background: #f9fafb;
    font-weight: 600;
    color: #111827;
  }

  @media (max-width: 768px) {
    .legal-narrow { padding: 0 20px; }
    .legal-hero h1 { font-size: 26px; }
    .legal-hero { padding: 48px 0 28px; }
    .legal-body { padding: 36px 0 72px; }
  }
</style>
{% endblock %}

{% block content %}

<section class="legal-hero">
  <div class="legal-narrow">
    <div class="section-label">Legal</div>
    <h1>{{ page.title }}</h1>
    <p class="last-updated">Last updated: May 16, 2026</p>
  </div>
</section>

<div class="legal-body">
  <div class="legal-narrow">
    <div class="richtext">
      {{ page.body|richtext }}
    </div>
  </div>
</div>

{% endblock %}
