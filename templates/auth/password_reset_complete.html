<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Reset Complete — VCard Manager</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E💼%3C/text%3E%3C/svg%3E">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        body { min-height:100vh; background:linear-gradient(135deg,#667eea 0%,#764ba2 100%); display:flex; align-items:center; justify-content:center; padding:1.5rem; }
        .auth-wrapper { width:100%; max-width:440px; }
        .auth-card { background:#fff; border-radius:20px; box-shadow:0 25px 60px rgba(0,0,0,.18); overflow:hidden; }
        .auth-header { background:linear-gradient(135deg,#4f46e5 0%,#7c3aed 100%); padding:2rem 2rem 1.5rem; text-align:center; color:white; }
        .auth-icon { width:64px; height:64px; border-radius:16px; background:rgba(255,255,255,.2); display:flex; align-items:center; justify-content:center; margin:0 auto 1rem; }
        .auth-body { padding:2rem; }
    </style>
</head>
<body>
<div class="auth-wrapper">
    <div class="auth-card">
        <div class="auth-header">
            <div class="auth-icon"><i class="bi bi-patch-check-fill fs-3"></i></div>
            <h4 class="fw-bold mb-1">Password Updated!</h4>
            <p class="opacity-75 mb-0 small">Your password has been reset successfully</p>
        </div>
        <div class="auth-body text-center">
            <div class="mb-4 p-3 rounded-3" style="background:#f0fdf4;border:1px solid #bbf7d0;">
                <i class="bi bi-check-circle-fill text-success fs-3 mb-2 d-block"></i>
                <p class="mb-0 text-success fw-semibold">Your password has been changed. You can now sign in with your new password.</p>
            </div>
            <a href="{% url 'user_login' %}" class="btn w-100 fw-semibold"
               style="background:linear-gradient(135deg,#4f46e5,#7c3aed);color:#fff;border-radius:10px;padding:.7rem;">
                <i class="bi bi-box-arrow-in-right me-2"></i>Sign In Now
            </a>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
