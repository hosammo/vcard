<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password — VCard Manager</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E💼%3C/text%3E%3C/svg%3E">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        body { min-height:100vh; background:linear-gradient(135deg,#667eea 0%,#764ba2 100%); display:flex; align-items:center; justify-content:center; padding:1.5rem; }
        .auth-wrapper { width:100%; max-width:440px; }
        .auth-card { background:#fff; border-radius:20px; box-shadow:0 25px 60px rgba(0,0,0,.18); overflow:hidden; }
        .auth-header { background:linear-gradient(135deg,#4f46e5 0%,#7c3aed 100%); padding:2rem 2rem 1.5rem; text-align:center; color:white; }
        .auth-icon { width:64px; height:64px; border-radius:16px; background:rgba(255,255,255,.2); display:flex; align-items:center; justify-content:center; margin:0 auto 1rem; backdrop-filter:blur(4px); }
        .auth-body { padding:2rem; }
        .form-label { font-weight:600; font-size:.875rem; color:#374151; }
        .form-control { border:1.5px solid #e5e7eb; border-radius:8px; padding:.65rem .875rem; font-size:.95rem; transition:border-color .2s,box-shadow .2s; }
        .form-control:focus { border-color:#7c3aed; box-shadow:0 0 0 3px rgba(124,58,237,.12); }
        .input-group-text { background:#f9fafb; border:1.5px solid #e5e7eb; border-right:none; border-radius:8px 0 0 8px; color:#9ca3af; }
        .input-group .form-control { border-left:none; border-radius:0 8px 8px 0; }
        .btn-auth { background:linear-gradient(135deg,#4f46e5 0%,#7c3aed 100%); border:none; border-radius:10px; padding:.7rem 1rem; font-weight:600; font-size:.95rem; color:white; transition:opacity .15s; }
        .btn-auth:hover { color:white; opacity:.9; }
    </style>
</head>
<body>
<div class="auth-wrapper">
    <div class="auth-card">
        <div class="auth-header">
            <div class="auth-icon"><i class="bi bi-key-fill fs-3"></i></div>
            <h4 class="fw-bold mb-1">Forgot Password?</h4>
            <p class="opacity-75 mb-0 small">Enter your email and we'll send a reset link</p>
        </div>
        <div class="auth-body">
            <form method="post" novalidate>
                {% csrf_token %}
                <div class="mb-4">
                    <label class="form-label">Email Address</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                        <input type="email" name="email" class="form-control" placeholder="your@email.com" required autofocus>
                    </div>
                    <div class="form-text text-muted mt-1" style="font-size:.8rem;">
                        We'll send a password reset link to this address if an account exists.
                    </div>
                </div>
                <button type="submit" class="btn btn-auth w-100">
                    <i class="bi bi-send me-2"></i>Send Reset Link
                </button>
            </form>
            <div class="text-center mt-4">
                <a href="{% url 'user_login' %}" class="text-muted small text-decoration-none">
                    <i class="bi bi-arrow-left me-1"></i>Back to Sign In
                </a>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
