<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - VCard Manager</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E💼%3C/text%3E%3C/svg%3E">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
        }

        .auth-wrapper {
            width: 100%;
            max-width: 420px;
        }

        .auth-card {
            background: #ffffff;
            border-radius: 20px;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.18);
            overflow: hidden;
        }

        .auth-header {
            background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
            padding: 2rem 2rem 1.5rem;
            text-align: center;
            color: white;
        }

        .auth-icon {
            width: 64px;
            height: 64px;
            border-radius: 16px;
            background: rgba(255, 255, 255, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1rem;
            backdrop-filter: blur(4px);
        }

        .auth-body {
            padding: 2rem;
        }

        .form-label {
            font-weight: 600;
            font-size: 0.875rem;
            color: #374151;
        }

        .form-control {
            border: 1.5px solid #e5e7eb;
            border-radius: 8px;
            padding: 0.65rem 0.875rem;
            font-size: 0.95rem;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .form-control:focus {
            border-color: #7c3aed;
            box-shadow: 0 0 0 3px rgba(124, 58, 237, 0.12);
        }

        .input-group-text {
            background: #f9fafb;
            border: 1.5px solid #e5e7eb;
            border-right: none;
            border-radius: 8px 0 0 8px;
            color: #9ca3af;
        }

        .input-group .form-control {
            border-left: none;
            border-radius: 0 8px 8px 0;
        }

        .input-group .form-control:focus {
            border-color: #7c3aed;
            box-shadow: 0 0 0 3px rgba(124, 58, 237, 0.12);
        }

        .btn-auth {
            background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
            border: none;
            border-radius: 10px;
            padding: 0.7rem 1rem;
            font-weight: 600;
            font-size: 0.95rem;
            color: white;
            transition: transform 0.15s ease, box-shadow 0.15s ease;
        }

        .btn-auth:hover {
            color: white;
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(79, 70, 229, 0.35);
        }

        .btn-auth:active {
            transform: translateY(0);
        }

        .divider {
            display: flex;
            align-items: center;
            gap: 1rem;
            color: #9ca3af;
            font-size: 0.8rem;
            margin: 1.5rem 0;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #e5e7eb;
        }

        .btn-register {
            border: 1.5px solid #e5e7eb;
            border-radius: 10px;
            padding: 0.65rem 1rem;
            font-weight: 600;
            font-size: 0.9rem;
            color: #374151;
            background: white;
            transition: border-color 0.2s, background 0.2s;
        }

        .btn-register:hover {
            border-color: #7c3aed;
            color: #7c3aed;
            background: #faf5ff;
        }

        @media (max-width: 480px) {
            body { padding: 1rem; }
            .auth-header { padding: 1.5rem 1.5rem 1.25rem; }
            .auth-body { padding: 1.5rem; }
        }
    </style>
</head>
<body>

    <div class="auth-wrapper">
        <div class="auth-card">

            <!-- Header -->
            <div class="auth-header">
                <div class="auth-icon">
                    <i class="bi bi-credit-card-2-front-fill fs-3"></i>
                </div>
                <h4 class="fw-bold mb-1">Welcome Back</h4>
                <p class="opacity-75 mb-0 small">Sign in to manage your business cards</p>
            </div>

            <!-- Body -->
            <div class="auth-body">

                {% if messages %}
                {% for message in messages %}
                <div class="alert alert-{% if message.tags == 'error' %}danger{% else %}success{% endif %} py-2 d-flex align-items-center gap-2 mb-3" role="alert">
                    <i class="bi bi-{% if message.tags == 'error' %}exclamation-triangle-fill{% else %}check-circle-fill{% endif %} flex-shrink-0"></i>
                    <span>{{ message }}</span>
                </div>
                {% endfor %}
                {% endif %}

                <form method="post" novalidate>
                    {% csrf_token %}
                    {% if next %}<input type="hidden" name="next" value="{{ next }}">{% endif %}

                    <div class="mb-3">
                        <label class="form-label">Email Address</label>
                        <div class="input-group">
                            <span class="input-group-text">
                                <i class="bi bi-envelope"></i>
                            </span>
                            {{ form.email }}
                        </div>
                    </div>

                    <div class="mb-4">
                        <div class="d-flex justify-content-between align-items-center mb-1">
                            <label class="form-label mb-0">Password</label>
                            <a href="{% url 'password_reset' %}" class="text-decoration-none"
                               style="font-size:.8rem;color:#7c3aed;">Forgot password?</a>
                        </div>
                        <div class="input-group">
                            <span class="input-group-text">
                                <i class="bi bi-lock"></i>
                            </span>
                            {{ form.password }}
                        </div>
                    </div>

                    <button type="submit" class="btn btn-auth w-100">
                        <i class="bi bi-box-arrow-in-right me-2"></i>Sign In
                    </button>
                </form>

                <div class="divider">or</div>

                <div class="text-center">
                    <p class="text-muted small mb-2">Don't have an account?</p>
                    <a href="{% url 'user_register' %}" class="btn btn-register w-100">
                        <i class="bi bi-person-plus me-2"></i>Create Account
                    </a>
                </div>

            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
