name: Deploy to devvcard.hosammo.com

on:
  push:
    branches: [dev]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEV_SSH_HOST }}
          username: ${{ secrets.DEV_SSH_USER }}
          key: ${{ secrets.DEV_SSH_KEY }}
          port: ${{ secrets.DEV_SSH_PORT }}
          script: |
            set -e
            cd /var/www/devvcard.hosammo.com

            echo "▶ Pulling latest dev branch..."
            git pull origin dev

            echo "▶ Installing dependencies..."
            ~/.local/bin/uv sync --frozen

            echo "▶ Running migrations..."
            DJANGO_SETTINGS_MODULE=vcard_project.settings_dev .venv/bin/python manage.py migrate

            echo "▶ Collecting static files..."
            DJANGO_SETTINGS_MODULE=vcard_project.settings_dev .venv/bin/python manage.py collectstatic --noinput

            echo "▶ Restarting gunicorn..."
            systemctl restart devvcard

            echo "✅ Deploy complete → https://devvcard.hosammo.com"
